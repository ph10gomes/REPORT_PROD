<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login NCSR</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: radial-gradient(circle at top, rgba(27, 48, 100, 0.28), transparent 28%),
                        linear-gradient(180deg, #071226 0%, #0f1d3d 100%);
            color: #eef2ff;
        }

        .login-card {
            width: min(420px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 32px;
            background: rgba(15, 34, 74, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.25);
        }

        .brand {
            display: grid;
            place-items: center;
            margin-bottom: 32px;
            gap: 18px;
        }

        .brand-badge {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: #f7f9ff;
            display: grid;
            place-items: center;
            color: #0f1d44;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.16);
        }

        .login-card h1 {
            margin: 0;
            font-size: 2.05rem;
            text-align: center;
            letter-spacing: -0.04em;
        }

        .login-card p {
            margin: 10px 0 0;
            text-align: center;
            color: #c7d3ff;
            font-size: 0.98rem;
            line-height: 1.6;
        }

        .weather-panel {
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 16px;
            align-items: center;
            padding: 20px;
            margin: 30px 0 24px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
        }

        .weather-icon {
            width: 64px;
            height: 64px;
            border-radius: 22px;
            display: grid;
            place-items: center;
            font-size: 1.8rem;
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
        }

        .weather-info {
            display: grid;
            gap: 4px;
        }

        .weather-info span {
            font-size: 0.95rem;
            color: #d9e4ff;
        }

        .weather-info strong {
            font-size: 1.8rem;
            line-height: 1;
            color: #ffffff;
        }

        .weather-info small {
            color: #b2c1ff;
            font-size: 0.95rem;
        }

        .form-group {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #9cb3ff;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .form-group input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.06);
            color: #eef2ff;
            font-size: 1rem;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(117, 156, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(103, 130, 255, 0.14);
            background: rgba(255, 255, 255, 0.09);
        }

        .btn-login {
            width: 100%;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 700;
            color: #0c1f56;
            background: linear-gradient(90deg, #8da4ff 0%, #6a82ff 100%);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 18px 40px rgba(106, 130, 255, 0.24);
        }

        .btn-login:hover {
            transform: translateY(-1px);
        }

        .login-note {
            margin-top: 20px;
            font-size: 0.92rem;
            color: #c2d0ff;
            text-align: center;
            line-height: 1.5;
        }

        .status {
            min-height: 22px;
            margin-top: 18px;
            color: #ffacac;
            font-size: 0.95rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <section class="login-card">
        <div class="brand">
            <div class="brand-badge">NCSR</div>
            <div>
                <h1>Bem-vindo</h1>
                <p>Entre com seu usuário para acessar o painel.</p>
            </div>
        </div>

        <div class="weather-panel">
            <div class="weather-icon" id="weatherIcon">☁️</div>
            <div class="weather-info">
                <span id="weatherLocation">Belo Horizonte/MG</span>
                <strong id="weatherTemp">22.0°C</strong>
                <small id="weatherCondition">Nublado</small>
            </div>
        </div>

        <div class="form-group">
            <label for="usuario">Usuário</label>
            <input id="usuario" name="usuario" type="text" placeholder="Digite seu usuário" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
        </div>

        <button class="btn-login" id="btnEntrar" type="button">Entrar</button>
        <div class="status" id="loginStatus"></div>
        <p class="login-note">Após o login, você será direcionado para a página inicial do relatório.</p>
    </section>

    <script>
        const btnEntrar = document.getElementById('btnEntrar');
        const statusEl = document.getElementById('loginStatus');

        async function login() {
            statusEl.textContent = '';
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value.trim();
            if (!usuario) {
                statusEl.textContent = 'Informe seu usuário.';
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha }),
                });
                const data = await response.json();
                if (!response.ok || !data.ok) {
                    statusEl.textContent = data.error || 'Falha ao autenticar.';
                    return;
                }
                window.location.href = data.redirect || '/index';
            } catch (error) {
                statusEl.textContent = 'Não foi possível conectar ao servidor.';
            }
        }

        async function loadWeather() {
            try {
                const response = await fetch('/api/weather');
                const data = await response.json();
                if (response.ok && data.ok) {
                    document.getElementById('weatherLocation').textContent = data.location || 'Belo Horizonte/MG';
                    document.getElementById('weatherTemp').textContent = data.temperature || '22.0°C';
                    document.getElementById('weatherCondition').textContent = data.condition || 'Nublado';
                    document.getElementById('weatherIcon').textContent = data.icon || '☁️';
                }
            } catch (_error) {
                // fallback stays with default Belo Horizonte values
            }
        }

        btnEntrar.addEventListener('click', login);
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                login();
            }
        });

        loadWeather();
    </script>
</body>
</html>
